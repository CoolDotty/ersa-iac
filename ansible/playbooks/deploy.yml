---
- name: Deploy services to ersa.whatbox.ca
  hosts: ersa
  gather_facts: true
  vars_files:
    - ../vars/main.yml

  pre_tasks:
    - name: Ensure supervisor installed
      pip:
        name: supervisor
        virtualenv: "{{ supervisor_venv }}"
        virtualenv_python: python3.12
      changed_when: false

    - name: Create required directories
      file:
        path: "{{ item }}"
        state: directory
        mode: 0700
      loop:
        - "{{ supervisor_log_dir }}"
        - "{{ supervisor_run_dir }}"
        - "{{ user_home }}/.config/supervisord"
        - "{{ user_home }}/.config/supervisord/conf.d"

  tasks:
    - name: Deploy supervisord.conf
      template:
        src: ../files/supervisord/supervisord.conf
        dest: "{{ supervisor_config }}"
        mode: 0600
      notify: reload supervisord

    - name: Pull latest Immich images
      shell: |
        cd {{ user_home }}/immich && podman-compose pull 2>&1
      when: services.immich.enabled
      changed_when: false

    - name: Deploy Immich docker-compose.yml
      copy:
        src: ../files/immich/docker-compose.yml
        dest: "{{ user_home }}/immich/docker-compose.yml"
        mode: 0600
      when: services.immich.enabled
      notify: restart immich

    - name: Deploy Immich supervisor config
      template:
        src: ../files/supervisord/conf.d/immich.ini
        dest: "{{ user_home }}/.config/supervisord/conf.d/immich.ini"
        mode: 0600
      when: services.immich.enabled
      notify: reload supervisord

    - name: Deploy n8n docker-compose.yml
      copy:
        src: ../files/n8n/docker-compose.yml
        dest: "{{ user_home }}/n8n/docker-compose.yml"
        mode: 0600
      when: services.n8n.enabled
      notify: restart n8n

    - name: Deploy n8n .env
      template:
        src: ../files/n8n/.env.j2
        dest: "{{ user_home }}/n8n/.env"
        mode: 0600
      when: services.n8n.enabled
      notify: restart n8n

    - name: Create n8n local-files directory
      file:
        path: "{{ user_home }}/n8n/local-files"
        state: directory
        mode: 0700
      when: services.n8n.enabled

    - name: Pull latest n8n image
      shell: |
        cd {{ user_home }}/n8n && podman-compose pull 2>&1
      when: services.n8n.enabled
      changed_when: false

    - name: Deploy n8n supervisor config
      template:
        src: ../files/supervisord/conf.d/n8n.ini
        dest: "{{ user_home }}/.config/supervisord/conf.d/n8n.ini"
        mode: 0600
      when: services.n8n.enabled
      notify: reload supervisord

    - name: Ensure n8n custom extensions directory
      file:
        path: "{{ user_home }}/n8n/.n8n/custom"
        state: directory
        mode: 0700
      when: services.n8n.enabled

    - name: Deploy n8n custom extensions package.json
      copy:
        src: ../files/n8n/custom-package.json
        dest: "{{ user_home }}/n8n/.n8n/custom/package.json"
        mode: 0600
        force: yes
      when: services.n8n.enabled
      notify: restart n8n

    - name: Create AFFiNE directories
      file:
        path: "{{ item }}"
        state: directory
        mode: 0700
      loop:
        - "{{ user_home }}/affine"
        - "{{ user_home }}/affine/postgres"
        - "{{ user_home }}/affine/storage"
        - "{{ user_home }}/affine/config"
      when: services.affine.enabled

    - name: Deploy AFFiNE docker-compose.yml
      copy:
        src: ../files/affine/docker-compose.yml
        dest: "{{ user_home }}/affine/docker-compose.yml"
        mode: 0600
      when: services.affine.enabled
      notify: restart affine

    - name: Deploy AFFiNE .env
      template:
        src: ../files/affine/.env.j2
        dest: "{{ user_home }}/affine/.env"
        mode: 0600
      when: services.affine.enabled
      notify: restart affine

    - name: Deploy AFFiNE config.json
      copy:
        src: ../files/affine/config.json
        dest: "{{ user_home }}/affine/config/config.json"
        mode: 0600
      when: services.affine.enabled
      notify: restart affine

    - name: Pull latest AFFiNE images
      shell: |
        cd {{ user_home }}/affine && podman-compose pull 2>&1
      when: services.affine.enabled
      changed_when: false

    - name: Deploy AFFiNE supervisor config
      template:
        src: ../files/supervisord/conf.d/affine.ini
        dest: "{{ user_home }}/.config/supervisord/conf.d/affine.ini"
        mode: 0600
      when: services.affine.enabled
      notify: reload supervisord

    - name: Create Forgejo directories
      file:
        path: "{{ item }}"
        state: directory
        mode: 0700
      loop:
        - "{{ user_home }}/forgejo"
        - "{{ user_home }}/forgejo/data"
        - "{{ user_home }}/forgejo/data/gitea"
        - "{{ user_home }}/forgejo/data/gitea/conf"
      when: services.forgejo.enabled
      ignore_errors: true

    - name: Deploy Forgejo docker-compose.yml
      copy:
        src: ../files/forgejo/docker-compose.yml
        dest: "{{ user_home }}/forgejo/docker-compose.yml"
        mode: 0600
      when: services.forgejo.enabled
      notify: restart forgejo

    - name: Deploy Forgejo app.ini (bootstrap only)
      copy:
        src: ../files/forgejo/app.ini
        dest: "{{ user_home }}/forgejo/data/gitea/conf/app.ini"
        mode: 0600
        force: no
      when: services.forgejo.enabled

    - name: Pull latest Forgejo image
      shell: |
        cd {{ user_home }}/forgejo && podman-compose pull 2>&1
      when: services.forgejo.enabled
      changed_when: false

    - name: Deploy Forgejo supervisor config
      template:
        src: ../files/supervisord/conf.d/forgejo.ini
        dest: "{{ user_home }}/.config/supervisord/conf.d/forgejo.ini"
        mode: 0600
      when: services.forgejo.enabled
      notify: reload supervisord

    - name: Create Karakeep directories
      file:
        path: "{{ item }}"
        state: directory
        mode: 0700
      loop:
        - "{{ user_home }}/karakeep"
        - "{{ user_home }}/karakeep/data"
        - "{{ user_home }}/karakeep/meilisearch"
      when: services.karakeep.enabled

    - name: Deploy Karakeep docker-compose.yml
      copy:
        src: ../files/karakeep/docker-compose.yml
        dest: "{{ user_home }}/karakeep/docker-compose.yml"
        mode: 0600
      when: services.karakeep.enabled
      notify: restart karakeep

    - name: Deploy Karakeep .env (first time only)
      copy:
        src: ../files/karakeep/.env
        dest: "{{ user_home }}/karakeep/.env"
        mode: 0600
        force: no
      when: services.karakeep.enabled

    - name: Generate Karakeep secrets if missing
      shell: |
        cd {{ user_home }}/karakeep
        if grep -q 'CHANGE_ME_NEXTAUTH_SECRET' .env 2>/dev/null; then
          sed -i "s/CHANGE_ME_NEXTAUTH_SECRET/$(openssl rand -base64 36)/" .env
        fi
        if grep -q 'CHANGE_ME_MEILI_MASTER_KEY' .env 2>/dev/null; then
          sed -i "s/CHANGE_ME_MEILI_MASTER_KEY/$(openssl rand -base64 36 | tr -dc 'A-Za-z0-9')/" .env
        fi
        if grep -q 'CHANGE_ME_OPENAI_API_KEY' .env 2>/dev/null; then
          sed -i 's/^OPENAI_BASE_URL=/#OPENAI_BASE_URL=/' .env
          sed -i 's/^OPENAI_API_KEY=/#OPENAI_API_KEY=/' .env
          sed -i 's/^INFERENCE_TEXT_MODEL=/#INFERENCE_TEXT_MODEL=/' .env
          sed -i 's/^INFERENCE_IMAGE_MODEL=/#INFERENCE_IMAGE_MODEL=/' .env
        fi
      when: services.karakeep.enabled
      changed_when: false

    - name: Pull latest Karakeep images
      shell: |
        cd {{ user_home }}/karakeep && podman-compose pull 2>&1
      when: services.karakeep.enabled
      changed_when: false

    - name: Deploy Karakeep supervisor config
      template:
        src: ../files/supervisord/conf.d/karakeep.ini
        dest: "{{ user_home }}/.config/supervisord/conf.d/karakeep.ini"
        mode: 0600
      when: services.karakeep.enabled
      notify: reload supervisord

    - name: Update Copyparty to latest version
      shell: |
        cd {{ user_home }}/copyparty
        rm -f copyparty-sfx.py
        wget -q https://github.com/9001/copyparty/releases/latest/download/copyparty-sfx.py
        chmod +x copyparty-sfx.py
      when: services.copyparty.enabled
      notify: restart copyparty

    - name: Deploy Copyparty supervisor config
      template:
        src: ../files/supervisord/conf.d/copyparty.ini
        dest: "{{ user_home }}/.config/supervisord/conf.d/copyparty.ini"
        mode: 0600
      when: services.copyparty.enabled
      notify: reload supervisord

    - name: Deploy Radicale supervisor config
      template:
        src: ../files/supervisord/conf.d/radicale.ini
        dest: "{{ user_home }}/.config/supervisord/conf.d/radicale.ini"
        mode: 0600
      when: services.radicale.enabled
      notify: reload supervisord

    - name: Deploy Tiny-Stats supervisor config
      template:
        src: ../files/supervisord/conf.d/tiny-stats.ini
        dest: "{{ user_home }}/.config/supervisord/conf.d/tiny-stats.ini"
        mode: 0600
      when: services["tiny-stats"].enabled
      notify: reload supervisord

    - name: Supervisor starts on reboot via cron
      cron:
        name: start_supervisord
        job: "{{ supervisor_venv }}/bin/supervisord -c {{ supervisor_config }}"
        special_time: reboot

    - name: Start supervisord if not running
      command: "{{ supervisor_venv }}/bin/supervisord -c {{ supervisor_config }}"
      register: sv_start
      changed_when: "'already running' not in sv_start.stderr"
      failed_when: false

    - name: Validate supervisor config
      command: "{{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} status"
      changed_when: false
      ignore_errors: true
      register: sv_status

    - name: Show supervisor status
      debug:
        var: sv_status.stdout_lines
      when: sv_status.stdout_lines is defined

  handlers:
    - name: reload supervisord
      shell: |
        {{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} reread
        {{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} update
      listen: "reload supervisord"

    - name: restart immich
      shell: |
        cd {{ user_home }}/immich
        {{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} stop immich
        podman-compose down && podman-compose up -d
        {{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} start immich
      listen: "restart immich"

    - name: restart n8n
      shell: |
        cd {{ user_home }}/n8n
        {{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} stop n8n
        podman-compose down
        cd {{ user_home }}/n8n/.n8n/custom && npm install --no-audit --no-fund
        cd {{ user_home }}/n8n && podman-compose up -d
        {{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} start n8n
      listen: "restart n8n"



    - name: restart affine
      shell: |
        cd {{ user_home }}/affine
        {{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} stop affine
        podman-compose down && podman-compose up -d
        {{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} start affine
      listen: "restart affine"

    - name: restart forgejo
      shell: |
        cd {{ user_home }}/forgejo
        {{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} stop forgejo
        podman-compose down && podman-compose up -d
        {{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} start forgejo
      listen: "restart forgejo"

    - name: restart karakeep
      shell: |
        cd {{ user_home }}/karakeep
        {{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} stop karakeep
        podman-compose down && podman-compose up -d
        {{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} start karakeep
      listen: "restart karakeep"

    - name: restart copyparty
      command: "{{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} restart copyparty"
      listen: "restart copyparty"

    - name: restart radicale
      command: "{{ supervisor_venv }}/bin/supervisorctl -c {{ supervisor_config }} restart radicale"
      listen: "restart radicale"
