[program:radicale]
command={{ user_home }}/radicale/virtualenv/bin/python -m radicale --config {{ user_home }}/radicale/config
directory={{ user_home }}/radicale
user=dotanarchy
autostart=true
autorestart=true
startretries=3
startsecs=10
stdout_logfile={{ user_home }}/.supervisor/logs/radicale.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile={{ user_home }}/.supervisor/logs/radicale.err
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
