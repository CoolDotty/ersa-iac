[program:affine]
command=bash -c "cd {{ user_home }}/affine && podman-compose down --remove-orphans 2>/dev/null; podman-compose up -d"
directory={{ user_home }}/affine
user=dotanarchy
autostart=true
autorestart=false
startretries=3
startsecs=1
stopcommand=bash -c "cd {{ user_home }}/affine && podman-compose down"
stopsignal=INT
stopwaitsecs=30
stdout_logfile={{ user_home }}/.supervisor/logs/affine.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile={{ user_home }}/.supervisor/logs/affine.err
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
environment=HOME="{{ user_home }}"
