name: karakeep

services:
  web:
    image: ghcr.io/karakeep-app/karakeep:${KARAKEEP_VERSION:-release}
    container_name: karakeep_web
    restart: unless-stopped
    cpus: "2"
    ports:
      - '127.0.0.1:${KARAKEEP_PORT:-5272}:3000'
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      MEILI_ADDR: http://meilisearch:7700
      BROWSER_WEB_URL: http://chrome:9222
      DATA_DIR: /data
      CRAWLER_NUM_WORKERS: "1"
      INFERENCE_NUM_WORKERS: "1"
      SEARCH_NUM_WORKERS: "1"
      ASSET_PREPROCESSING_NUM_WORKERS: "1"
      WEBHOOK_NUM_WORKERS: "1"
      RULE_ENGINE_NUM_WORKERS: "1"
      UV_THREADPOOL_SIZE: "4"

  chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    container_name: karakeep_chrome
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars

  meilisearch:
    image: getmeili/meilisearch:v1.41.0
    container_name: karakeep_meilisearch
    restart: unless-stopped
    cpus: "2"
    env_file:
      - .env
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MAX_INDEXING_THREADS: "2"
      MEILI_EXPERIMENTAL_NB_SEARCHES_PER_CORE: "1"
    volumes:
      - ./meilisearch:/meili_data
